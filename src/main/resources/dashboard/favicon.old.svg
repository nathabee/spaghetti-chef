<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SpaghettiChef bee icon simplified</title>
   
  <rect width="512" height="512" fill="none"/>

  <!-- Wings: lifted upward/outward -->
  <path d="M224 208
           C190 150, 128 120, 78 132
           C42 140, 28 172, 38 208
           C52 256, 112 274, 172 256
           C196 248, 212 232, 224 208 Z"
        fill="#8CCBFF"/>
  <path d="M288 208
           C322 150, 384 120, 434 132
           C470 140, 484 172, 474 208
           C460 256, 400 274, 340 256
           C316 248, 300 232, 288 208 Z"
        fill="#8CCBFF"/>

  <!-- Antennae -->
  <path d="M228 95 C214 67, 194 58, 177 67" fill="none" stroke="#18212F" stroke-width="12" stroke-linecap="round"/>
  <path d="M284 95 C298 67, 318 58, 335 67" fill="none" stroke="#18212F" stroke-width="12" stroke-linecap="round"/>
  <circle cx="173" cy="66" r="10" fill="#18212F"/>
  <circle cx="339" cy="66" r="10" fill="#18212F"/>

  <!-- Head -->
  <circle cx="256" cy="136" r="44" fill="#18212F"/>

  <!-- Thorax -->
  <ellipse cx="256" cy="224" rx="76" ry="62" fill="#F5B21A"/>

  <!-- Belly outer -->
  <path d="M256 212
           C338 212, 400 276, 400 354
           C400 434, 338 490, 256 490
           C174 490, 112 434, 112 354
           C112 276, 174 212, 256 212 Z"
        fill="#18212F"/>

  <!-- Belly inner -->
  <path d="M256 232
           C325 232, 378 287, 378 354
           C378 423, 325 468, 256 468
           C187 468, 134 423, 134 354
           C134 287, 187 232, 256 232 Z"
        fill="#F5B21A"/>

  <!-- Side stripes -->
  <path d="M134 320 C156 326, 174 338, 188 354 C174 370, 156 382, 134 388 Z" fill="#18212F"/>
  <path d="M378 320 C356 326, 338 338, 324 354 C338 370, 356 382, 378 388 Z" fill="#18212F"/>

  <!-- Top and bottom stripe accents -->
  <rect x="174" y="252" width="164" height="14" rx="7" fill="#18212F"/>
  <rect x="174" y="418" width="164" height="14" rx="7" fill="#18212F"/>

  <!-- Printer window -->
  <rect x="174" y="278" width="164" height="116" rx="18" fill="#F8FAFC" stroke="#18212F" stroke-width="8"/>

  <!-- Printer frame -->
  <rect x="206" y="300" width="100" height="68" rx="8" fill="none" stroke="#18212F" stroke-width="6"/>

  <!-- Top rail -->
  <line x1="206" y1="308" x2="306" y2="308" stroke="#18212F" stroke-width="6" stroke-linecap="round"/>

  <!-- Vertical rails -->
  <line x1="218" y1="308" x2="218" y2="368" stroke="#18212F" stroke-width="5" stroke-linecap="round"/>
  <line x1="294" y1="308" x2="294" y2="368" stroke="#18212F" stroke-width="5" stroke-linecap="round"/>

  <!-- Nozzle carriage -->
  <rect x="245" y="308" width="22" height="14" rx="4" fill="#7C3AED"/>
  <line x1="256" y1="322" x2="256" y2="338" stroke="#7C3AED" stroke-width="5" stroke-linecap="round"/>

  <!-- Printed object -->
  <path d="M238 338 H274 V356 H284 V364 H228 V356 H238 Z"
        fill="#F5B21A" stroke="#18212F" stroke-width="4" stroke-linejoin="round"/>

  <!-- Print bed -->
  <line x1="224" y1="368" x2="288" y2="368" stroke="#18212F" stroke-width="6" stroke-linecap="round"/>

  <!-- Status indicators -->
  <circle cx="194" cy="292" r="4" fill="#7C3AED"/>
  <circle cx="208" cy="292" r="4" fill="#7C3AED"/>
  <circle cx="222" cy="292" r="4" fill="#7C3AED"/>

  <!-- Side port hint -->
  <path d="M322 324 C334 324, 340 332, 340 344 C340 356, 334 364, 322 364"
        fill="none" stroke="#18212F" stroke-width="5" stroke-linecap="round"/>
  <circle cx="346" cy="344" r="5" fill="#18212F"/>

  <!-- Stinger: pointing away from body -->
  <path d="M236 490 L276 490 L256 512 Z" fill="#18212F"/>
</svg>