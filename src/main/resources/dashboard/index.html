<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>SpaghettiChef Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/dashboard/favicon.svg">
  <link rel="stylesheet" href="/dashboard/dashboard.css">
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <p class="eyebrow">SpaghettiChef</p>
        <h1>Dashboard</h1>
        <p class="sidebar-lead">Local farm console.</p>
      </div>

      <nav id="primaryNav" class="primary-nav" aria-label="Primary"></nav>

      <section id="selectedPrinterNavSection" class="printer-nav-section hidden"
        aria-labelledby="selectedPrinterNavTitle">
        <div class="section-header compact">
          <div>
            <h2 id="selectedPrinterNavTitle">Selected printer</h2>
            <p class="muted" id="selectedPrinterLabel">No printer selected.</p>
          </div>
        </div>
        <nav id="selectedPrinterNav" class="secondary-nav" aria-label="Selected printer"></nav>
      </section>
    </aside>
    <main class="main-panel">
      <div class="main-panel-sticky">
        <header class="topbar">
          <div>
            <p class="eyebrow">Operator console</p>
            <h2 id="pageTitle">Loading dashboard</h2>
            <p id="pageLead" class="lead">Preparing dashboard shell.</p>
          </div>
          <div class="topbar-actions">
            <div class="refresh-meta">
              <span class="muted">Last refresh</span>
              <strong id="lastRefresh">never</strong>
            </div>
            <button id="refreshButton" type="button">Refresh now</button>
          </div>
        </header>

        <section id="globalMessage" class="global-message global-message-info" aria-live="polite"></section>
      </div>

      <section id="pageContent" class="page-content" aria-live="polite">
        <div class="empty-state">
          <h3>Loading dashboard</h3>
          <p class="muted">Reading printers, jobs, and monitoring settings.</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/dashboard/dashboard.js"></script>
</body>

</html>
